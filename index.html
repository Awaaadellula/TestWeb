<script>
'use strict';

/* ═══════════════════════════════════════════════════════════════════
   WEB WORKER — embedded as blob URL
   Handles: streaming CSV (any size), XLSX (via SheetJS CDN),
            IndexedDB writes, alert generation, progress reporting
   Main thread stays 100% responsive during import.
═══════════════════════════════════════════════════════════════════ */
const WORKER_SRC = `
'use strict';
const DB_NAME='netwatch_v3',DB_VER=3;
let _db=null;
async function openDB(){
  if(_db)return _db;
  return new Promise((res,rej)=>{
    const req=indexedDB.open(DB_NAME,DB_VER);
    req.onupgradeneeded=e=>{
      const db=e.target.result;
      if(!db.objectStoreNames.contains('sites')){
        const s=db.createObjectStore('sites',{keyPath:'id',autoIncrement:true});
        s.createIndex('managedElementId','managedElementId',{unique:true});
      }
      if(!db.objectStoreNames.contains('cells')){
        const c=db.createObjectStore('cells',{keyPath:'id',autoIncrement:true});
        c.createIndex('siteId','siteId');
      }
      if(!db.objectStoreNames.contains('kpi_agg')){
        const k=db.createObjectStore('kpi_agg',{keyPath:['siteId','cellId','tsBucket']});
        k.createIndex('siteId_tsBucket',['siteId','tsBucket']);
        k.createIndex('siteId','siteId');
      }
      if(!db.objectStoreNames.contains('alerts')){
        const a=db.createObjectStore('alerts',{keyPath:'id',autoIncrement:true});
        a.createIndex('siteId','siteId');
        a.createIndex('severity','severity');
        a.createIndex('resolved','resolved');
        a.createIndex('tsBucket','tsBucket');
      }
    };
    req.onsuccess=e=>{_db=e.target.result;res(_db);};
    req.onerror=e=>rej(e.target.error);
  });
}
function wrap(req){return new Promise((res,rej)=>{req.onsuccess=e=>res(e.target.result);req.onerror=e=>rej(e.target.error);})}
function txS(name,mode='readonly'){return _db.transaction(name,mode).objectStore(name);}
function truncHour(ts){const d=new Date(ts);d.setMinutes(0,0,0,0);return d.getTime();}
function n(v){if(v==null||v===''||isNaN(Number(v)))return null;return Number(v);}

function detectDelim(line){
  const c={',':(line.match(/,/g)||[]).length,'\t':(line.match(/\t/g)||[]).length,';':(line.match(/;/g)||[]).length};
  return Object.entries(c).sort((a,b)=>b[1]-a[1])[0][0];
}
function parseCSVLine(line,delim){
  const r=[];let f='',inQ=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(inQ){if(ch==='"'&&line[i+1]==='"'){f+='"';i++;}else if(ch==='"')inQ=false;else f+=ch;}
    else{if(ch==='"')inQ=true;else if(ch===delim){r.push(f.trim());f='';}else f+=ch;}
  }
  r.push(f.trim());return r;
}

function initAgg(siteId,cellId,meta){
  return{siteId,cellId,tsBucket:meta.tsBucket,cellName:meta.cellName,sector:meta.sector,band:meta.band,product:meta.product,
    avail_s:0,avail_c:0,dlCell_s:0,dlCell_c:0,ulCell_s:0,ulCell_c:0,dlPrb_s:0,dlPrb_c:0,
    cqi_s:0,cqi_c:0,intf_s:0,intf_c:0,users_s:0,users_c:0,dlTraf_s:0,dlTraf_c:0,
    ulTraf_s:0,ulTraf_c:0,rrc_s:0,rrc_c:0,cqiPoor_s:0,cqiPoor_c:0,
    avgTa_s:0,avgTa_c:0,ta0_s:0,ta0_c:0,ta5_s:0,ta5_c:0,ta1k_s:0,ta1k_c:0,ta2k_s:0,ta2k_c:0,ta3k_s:0,ta3k_c:0};
}
function accum(b,v){
  function add(sk,ck,val){if(val!=null){b[sk]+=val;b[ck]++;}}
  add('avail_s','avail_c',v.av);add('dlCell_s','dlCell_c',v.dl);add('ulCell_s','ulCell_c',v.ul);
  add('dlPrb_s','dlPrb_c',v.prb);add('cqi_s','cqi_c',v.cqi);add('intf_s','intf_c',v.intf);
  add('users_s','users_c',v.usr);add('dlTraf_s','dlTraf_c',v.dlT);add('ulTraf_s','ulTraf_c',v.ulT);
  add('rrc_s','rrc_c',v.rrc);add('cqiPoor_s','cqiPoor_c',v.cqiP);
  add('avgTa_s','avgTa_c',v.avgTa);add('ta0_s','ta0_c',v.ta0);add('ta5_s','ta5_c',v.ta5);
  add('ta1k_s','ta1k_c',v.ta1k);add('ta2k_s','ta2k_c',v.ta2k);add('ta3k_s','ta3k_c',v.ta3k);
}

/* Alert threshold rules — critical before major for each KPI (first-match wins per KPI) */
const THRESHOLDS=[
  {kpi:'dl_prb_utilization', sf:'dlPrb_s', cf:'dlPrb_c', thr:0.90,sev:'critical',lt:false,lbl:'DL PRB > 90%'},
  {kpi:'dl_prb_utilization', sf:'dlPrb_s', cf:'dlPrb_c', thr:0.75,sev:'major',   lt:false,lbl:'DL PRB > 75%'},
  {kpi:'cqi_poor_rate',      sf:'cqiPoor_s',cf:'cqiPoor_c',thr:0.15,sev:'critical',lt:false,lbl:'CQI Poor Rate > 15%'},
  {kpi:'cqi_poor_rate',      sf:'cqiPoor_s',cf:'cqiPoor_c',thr:0.10,sev:'major',   lt:false,lbl:'CQI Poor Rate > 10%'},
  {kpi:'ul_interference_dbm',sf:'intf_s',  cf:'intf_c',  thr:-100,sev:'critical',lt:false,lbl:'UL Interference > -100 dBm'},
  {kpi:'ul_interference_dbm',sf:'intf_s',  cf:'intf_c',  thr:-105,sev:'major',   lt:false,lbl:'UL Interference > -105 dBm'},
  {kpi:'availability',       sf:'avail_s', cf:'avail_c', thr:0.99,sev:'critical',lt:true, lbl:'Availability < 99%'},
];

function buildBucketAlerts(rec){
  const out=[];const fired=new Set();
  for(const t of THRESHOLDS){
    if(fired.has(t.kpi))continue;
    if(!rec[t.cf])continue;
    const avg=rec[t.sf]/rec[t.cf];
    const fires=t.lt?avg<t.thr:avg>t.thr;
    if(fires){
      out.push({
        siteId:rec.siteId,cellId:rec.cellId,cellName:rec.cellName,
        kpiName:t.kpi,kpiValue:avg,threshold:t.thr,severity:t.sev,
        message:t.lbl+' (avg '+avg.toFixed(3)+') at '+new Date(rec.tsBucket).toISOString()+' cell '+rec.cellName,
        tsBucket:rec.tsBucket,resolved:0,resolvedAt:null,createdAt:Date.now(),
      });
      fired.add(t.kpi);
    }
  }
  return out;
}

async function flushAgg(aggMap){
  const records=Object.values(aggMap);
  if(!records.length)return;
  const BATCH=2000;
  for(let i=0;i<records.length;i+=BATCH){
    const slice=records.slice(i,i+BATCH);
    const tr=_db.transaction('kpi_agg','readwrite');
    const store=tr.objectStore('kpi_agg');
    for(const r of slice)store.put(r);
    await new Promise((res,rej)=>{tr.oncomplete=res;tr.onerror=()=>rej(tr.error);});
  }
  // Generate and store alerts
  const alertRecs=[];
  for(const r of records)alertRecs.push(...buildBucketAlerts(r));
  if(alertRecs.length){
    for(let i=0;i<alertRecs.length;i+=BATCH){
      const slice=alertRecs.slice(i,i+BATCH);
      const tr=_db.transaction('alerts','readwrite');
      const store=tr.objectStore('alerts');
      for(const a of slice)store.add(a);
      await new Promise((res,rej)=>{tr.oncomplete=res;tr.onerror=()=>rej(tr.error);});
    }
  }
}

/* ── Site/cell helpers with per-site caching ────────────────────────────── */
async function getOrCreateSite(siteCache,meId,name,subnetworkName){
  if(siteCache.has(meId))return siteCache.get(meId);
  const ex=await wrap(txS('sites').index('managedElementId').get(IDBKeyRange.only(meId)));
  let site;
  if(ex){site=ex;}
  else{const id=await wrap(txS('sites','readwrite').add({managedElementId:meId,name,subnetworkName,createdAt:Date.now()}));site={id,managedElementId:meId,name,subnetworkName};}
  siteCache.set(meId,site);
  return site;
}
/* Cell cache key: siteId:cellName to prevent cross-site collisions */
async function getOrCreateCell(cellCache,siteId,cellName,meta){
  const key=siteId+':'+cellName;
  if(cellCache.has(key))return cellCache.get(key);
  const all=await wrap(txS('cells').index('siteId').getAll(IDBKeyRange.only(siteId)));
  const ex=all.find(c=>c.cellName===cellName);
  let cell;
  if(ex){cell=ex;}
  else{const id=await wrap(txS('cells','readwrite').add({siteId,cellName,...meta}));cell={id,siteId,cellName,...meta};}
  cellCache.set(key,cell);
  return cell;
}

/* ═══════════════════════════════════════════════════════════════════
   CSV PROCESSOR
═══════════════════════════════════════════════════════════════════ */
async function processCSV(file){
  const fileSize=file.size;
  let processedBytes=0,rows=0;
  const reader=file.stream().getReader();
  const decoder=new TextDecoder('utf-8',{fatal:false});
  let buf='',headers=null,delim=',',hIdx={};
  const siteCache=new Map();  /* meId → site */
  const cellCache=new Map();  /* siteId:cellName → cell */
  let aggMap={};
  const FLUSH=150000;

  async function processRow(row){
    if(row.length<3)return;
    const g=i=>i>=0?n(row[i]):null;
    /* Resolve site from EVERY row (multi-site support) */
    const meIdRaw=hIdx.me>=0?row[hIdx.me]:'';
    const meId=(meIdRaw||'UNKNOWN').trim()||'UNKNOWN';
    const nm=meId.replace(/\(.*\)/,'').trim();
    const sn=hIdx.subnet>=0?(row[hIdx.subnet]||null):null;
    const site=await getOrCreateSite(siteCache,meId,nm,sn);
    const siteId=site.id;

    const cellName=row[hIdx.cellName]||'';if(!cellName)return;
    const tsRaw=row[hIdx.beginTime];if(!tsRaw)return;
    const ts=new Date(tsRaw);if(isNaN(ts.getTime()))return;
    const tsBucket=truncHour(ts.getTime());

    const meta={sector:hIdx.sector>=0?(row[hIdx.sector]||null):null,
      band:hIdx.band>=0?n(row[hIdx.band]):null,
      product:hIdx.product>=0?(row[hIdx.product]||null):null};
    const cell=await getOrCreateCell(cellCache,siteId,cellName,meta);

    const aggKey=cell.id+'_'+tsBucket;
    if(!aggMap[aggKey])
      aggMap[aggKey]=initAgg(siteId,cell.id,{tsBucket,cellName,sector:cell.sector,band:cell.band,product:cell.product});
    accum(aggMap[aggKey],{
      av:g(hIdx.avail),dl:g(hIdx.dlCell),ul:g(hIdx.ulCell),prb:g(hIdx.dlPrb),
      cqi:g(hIdx.avgCqi),intf:g(hIdx.interf),usr:g(hIdx.userNum),
      dlT:g(hIdx.dlTraf),ulT:g(hIdx.ulTraf),rrc:g(hIdx.rrc),cqiP:g(hIdx.cqiPoor),
      avgTa:g(hIdx.avgTa),ta0:g(hIdx.ta0),ta5:g(hIdx.ta5),
      ta1k:g(hIdx.ta1k),ta2k:g(hIdx.ta2k),ta3k:g(hIdx.ta3k),
    });
    rows++;
    if(rows%5000===0){
      self.postMessage({type:'progress',rows,processedBytes,fileSize,buckets:Object.keys(aggMap).length});
      await new Promise(r=>setTimeout(r,0));
    }
    if(rows%FLUSH===0){
      self.postMessage({type:'writing',buckets:Object.keys(aggMap).length});
      await flushAgg(aggMap);aggMap={};
    }
  }

  while(true){
    const{done,value}=await reader.read();
    if(done)break;
    processedBytes+=value.byteLength;
    buf+=decoder.decode(value,{stream:true});
    const lines=buf.split(/\r?\n/);buf=lines.pop();
    for(const rawLine of lines){
      const line=rawLine.trim();if(!line)continue;
      if(!headers){
        delim=detectDelim(rawLine);headers=parseCSVLine(rawLine,delim);
        const fi=k=>headers.findIndex(h=>typeof k==='function'?k(h):h===k);
        const fs=k=>headers.findIndex(h=>h.startsWith(k));
        hIdx={
          cellName:fi('Cell Name'),beginTime:fi('Begin Time'),
          me:fi(h=>h==='Managed Element'||h==='ManagedElement ID'),
          sector:fi('SECTOR'),band:fi('Frequency band indicator'),product:fi('product'),
          subnet:fi('SubnetWork Name'),
          avail:fs('Site Availability Rate'),dlTraf:fs('Total DL Traffic Volume'),
          ulTraf:fs('Total UL Traffic Volume'),ulCell:fs('UL Cell Throughput'),
          dlCell:fs('DL Cell Throughput'),userNum:fs('LTE User Number'),
          dlPrb:fs('LTE DL PRB Utilization_1'),interf:fs('4G UL Interference'),
          cqiPoor:fi('4G CQI<=5 Rate'),avgCqi:fi('Avg CQI'),
          rrc:fi('Mean Number of RRC Connection User'),
          avgTa:fi('Average TA (m)'),ta0:fi('TA(0-500m) Ratio'),
          ta5:fi('TA(500-1KM) Ratio'),ta1k:fi('TA(1KM-2KM) Ratio'),
          ta2k:fi('TA(2KM-3KM) Ratio'),ta3k:fi('TA(>3KM) Ratio'),
        };
        continue;
      }
      await processRow(parseCSVLine(line,delim));
    }
  }
  if(buf.trim()&&headers)await processRow(parseCSVLine(buf.trim(),delim));
  self.postMessage({type:'writing',buckets:Object.keys(aggMap).length});
  await flushAgg(aggMap);
  self.postMessage({type:'complete',rows,buckets:Object.keys(aggMap).length});
}

/* ═══════════════════════════════════════════════════════════════════
   XLSX PROCESSOR
═══════════════════════════════════════════════════════════════════ */
async function processXLSX(buffer){
  importScripts('https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js');
  const wb=XLSX.read(new Uint8Array(buffer),{type:'array',cellDates:true});
  const ws=wb.Sheets[wb.SheetNames[0]];
  const allRows=XLSX.utils.sheet_to_json(ws,{defval:null,raw:false,dateNF:'yyyy-mm-dd HH:mm:ss'});
  if(!allRows.length){self.postMessage({type:'complete',rows:0,buckets:0});return;}
  const total=allRows.length;
  function fK(row,prefix){return Object.keys(row).find(k=>k.startsWith(prefix));}
  function nR(row,key){if(!key||row[key]==null||isNaN(Number(row[key])))return null;return Number(row[key]);}

  const siteCache=new Map();  /* meId → site */
  const cellCache=new Map();  /* siteId:cellName → cell */
  let aggMap={};
  let rows=0;
  const FLUSH=50000;

  for(const raw of allRows){
    /* Resolve site from EVERY row (multi-site support) */
    const meId=String(raw['ManagedElement ID']??raw['Managed Element']??'UNKNOWN').trim()||'UNKNOWN';
    const siteName=meId.replace(/\(.*\)/,'').trim();
    const subnetworkName=raw['SubnetWork Name']!=null?String(raw['SubnetWork Name']):null;
    const site=await getOrCreateSite(siteCache,meId,siteName,subnetworkName);
    const siteId=site.id;

    const cellName=String(raw['Cell Name']??'');
    if(!cellName){rows++;continue;}
    const tsRaw=raw['Begin Time'];if(!tsRaw){rows++;continue;}
    const ts=new Date(String(tsRaw));if(isNaN(ts.getTime())){rows++;continue;}
    const tsBucket=truncHour(ts.getTime());

    const meta={sector:raw['SECTOR']!=null?String(raw['SECTOR']):null,
      band:raw['Frequency band indicator']!=null&&!isNaN(Number(raw['Frequency band indicator']))?Number(raw['Frequency band indicator']):null,
      product:raw['product']!=null?String(raw['product']):null};
    const cell=await getOrCreateCell(cellCache,siteId,cellName,meta);

    const aggKey=cell.id+'_'+tsBucket;
    if(!aggMap[aggKey])aggMap[aggKey]=initAgg(siteId,cell.id,{tsBucket,cellName,sector:cell.sector,band:cell.band,product:cell.product});
    accum(aggMap[aggKey],{
      av:nR(raw,fK(raw,'Site Availability Rate')),dl:nR(raw,fK(raw,'DL Cell Throughput')),
      ul:nR(raw,fK(raw,'UL Cell Throughput')),prb:nR(raw,fK(raw,'LTE DL PRB Utilization_1')),
      cqi:nR(raw,'Avg CQI'),intf:nR(raw,fK(raw,'4G UL Interference')),
      usr:nR(raw,fK(raw,'LTE User Number')),dlT:nR(raw,fK(raw,'Total DL Traffic Volume')),
      ulT:nR(raw,fK(raw,'Total UL Traffic Volume')),rrc:nR(raw,'Mean Number of RRC Connection User'),
      cqiP:nR(raw,'4G CQI<=5 Rate'),avgTa:nR(raw,'Average TA (m)'),
      ta0:nR(raw,'TA(0-500m) Ratio'),ta5:nR(raw,'TA(500-1KM) Ratio'),
      ta1k:nR(raw,'TA(1KM-2KM) Ratio'),ta2k:nR(raw,'TA(2KM-3KM) Ratio'),ta3k:nR(raw,'TA(>3KM) Ratio'),
    });
    rows++;
    if(rows%5000===0){
      self.postMessage({type:'progress',rows,processedBytes:rows,fileSize:total,buckets:Object.keys(aggMap).length});
      await new Promise(r=>setTimeout(r,0));
    }
    if(rows%FLUSH===0){self.postMessage({type:'writing',buckets:Object.keys(aggMap).length});await flushAgg(aggMap);aggMap={};}
  }
  self.postMessage({type:'writing',buckets:Object.keys(aggMap).length});
  await flushAgg(aggMap);
  self.postMessage({type:'complete',rows,buckets:Object.keys(aggMap).length});
}

self.onmessage=async e=>{
  try{
    await openDB();
    if(e.data.type==='csv')await processCSV(e.data.file);
    else if(e.data.type==='xlsx')await processXLSX(e.data.buffer);
  }catch(err){
    self.postMessage({type:'error',message:err.message||String(err)});
  }
};
`;

/* ═══════════════════════════════════════════════════════════════════
   INDEXED-DB  (main thread reader)
═══════════════════════════════════════════════════════════════════ */
const DB=(()=>{
  let _db=null;
  const DB_NAME='netwatch_v3',DB_VER=3;
  async function open(){
    if(_db)return _db;
    return new Promise((res,rej)=>{
      const req=indexedDB.open(DB_NAME,DB_VER);
      req.onupgradeneeded=e=>{
        const db=e.target.result;
        if(!db.objectStoreNames.contains('sites')){const s=db.createObjectStore('sites',{keyPath:'id',autoIncrement:true});s.createIndex('managedElementId','managedElementId',{unique:true});}
        if(!db.objectStoreNames.contains('cells')){const c=db.createObjectStore('cells',{keyPath:'id',autoIncrement:true});c.createIndex('siteId','siteId');}
        if(!db.objectStoreNames.contains('kpi_agg')){const k=db.createObjectStore('kpi_agg',{keyPath:['siteId','cellId','tsBucket']});k.createIndex('siteId_tsBucket',['siteId','tsBucket']);k.createIndex('siteId','siteId');}
        if(!db.objectStoreNames.contains('alerts')){const a=db.createObjectStore('alerts',{keyPath:'id',autoIncrement:true});a.createIndex('siteId','siteId');a.createIndex('severity','severity');a.createIndex('resolved','resolved');a.createIndex('tsBucket','tsBucket');}
      };
      req.onsuccess=e=>{_db=e.target.result;res(_db);};
      req.onerror=e=>rej(e.target.error);
    });
  }
  function wrap(req){return new Promise((res,rej)=>{req.onsuccess=e=>res(e.target.result);req.onerror=e=>rej(e.target.error);});}
  function tx(store,mode='readonly'){return _db.transaction(store,mode).objectStore(store);}
  async function getAll(store){return wrap(tx(store).getAll());}
  async function getAllByIdx(store,idx,val){return wrap(tx(store).index(idx).getAll(IDBKeyRange.only(val)));}
  async function getByIdx(store,idx,val){return wrap(tx(store).index(idx).get(IDBKeyRange.only(val)));}

  async function scanSite(siteId,cb){
    return new Promise((res,rej)=>{
      const req=tx('kpi_agg').index('siteId').openCursor(IDBKeyRange.only(siteId));
      req.onsuccess=e=>{const c=e.target.result;if(!c){res();return;}cb(c.value);c.continue();};
      req.onerror=e=>rej(e.target.error);
    });
  }
  async function scanRange(siteId,fromTs,toTs,cb){
    return new Promise((res,rej)=>{
      const range=IDBKeyRange.bound([siteId,fromTs],[siteId,toTs]);
      const req=tx('kpi_agg').index('siteId_tsBucket').openCursor(range);
      req.onsuccess=e=>{const c=e.target.result;if(!c){res();return;}cb(c.value);c.continue();};
      req.onerror=e=>rej(e.target.error);
    });
  }

  /* Alerts queries */
  async function getAllAlerts(){return wrap(tx('alerts').getAll());}
  async function resolveAlert(id){
    return new Promise((res,rej)=>{
      const store=_db.transaction('alerts','readwrite').objectStore('alerts');
      const req=store.get(id);
      req.onsuccess=e=>{
        const rec=e.target.result;if(!rec){res();return;}
        rec.resolved=1;rec.resolvedAt=Date.now();
        const put=store.put(rec);put.onsuccess=()=>res();put.onerror=e2=>rej(e2.target.error);
      };
      req.onerror=e=>rej(e.target.error);
    });
  }

  async function clearAll(){
    const tr=_db.transaction(['sites','cells','kpi_agg','alerts'],'readwrite');
    ['sites','cells','kpi_agg','alerts'].forEach(s=>tr.objectStore(s).clear());
    return new Promise((res,rej)=>{tr.oncomplete=res;tr.onerror=rej;});
  }
  return{open,getAll,getAllByIdx,getByIdx,scanSite,scanRange,getAllAlerts,resolveAlert,clearAll};
})();

function fmt(v,d=1){if(v==null||isNaN(v))return '—';return Number(v).toFixed(d);}
function fmtPct(v,d=1){if(v==null||isNaN(v))return '—';return(v*100).toFixed(d)+'%';}
function fmtMbps(v){if(v==null||isNaN(v))return '—';if(v>=1000)return(v/1000).toFixed(2)+' Gbps';return v.toFixed(1)+' Mbps';}
function fmtDate(d){return new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});}
function fmtBytes(b){if(b>=1e9)return(b/1e9).toFixed(2)+' GB';if(b>=1e6)return(b/1e6).toFixed(1)+' MB';return(b/1e3).toFixed(0)+' KB';}
function fmtTs(ts,gran){
  const d=new Date(ts);
  if(gran==='hourly')return d.toLocaleDateString('en-GB',{month:'2-digit',day:'2-digit'})+' '+d.getHours().toString().padStart(2,'0')+':00';
  if(gran==='daily')return d.toLocaleDateString('en-GB',{month:'short',day:'numeric'});
  return 'Wk '+d.toLocaleDateString('en-GB',{month:'short',day:'numeric'});
}
function fmtDt(ts){const d=new Date(ts);return d.toLocaleDateString('en-GB',{month:'short',day:'numeric'})+' '+d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});}
function truncTs(ts,gran){
  const d=new Date(ts);
  if(gran==='hourly'){d.setMinutes(0,0,0,0);}
  else if(gran==='daily'){d.setHours(0,0,0,0);}
  else{d.setHours(0,0,0,0);d.setDate(d.getDate()-d.getDay());}
  return d.getTime();
}
function escHtml(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function getGroupKey(r,groupBy){
  if(groupBy==='sector')return r.sector||'Unknown';
  if(groupBy==='technology')return r.product?(r.product+(r.band!=null?' B'+r.band:'')):r.band!=null?'B'+r.band:'Unknown';
  return r.cellName||('Cell '+r.cellId);
}

async function getSiteSummary(siteId){
  let avail_s=0,avail_c=0,dlCell_s=0,dlCell_c=0,cqi_s=0,cqi_c=0,dlPrb_s=0,dlPrb_c=0,dlTraf_s=0,users_s=0,users_c=0;
  let minTs=Infinity,maxTs=-Infinity,has=false;
  await DB.scanSite(siteId,r=>{
    has=true;
    avail_s+=r.avail_s; avail_c+=r.avail_c;
    dlCell_s+=r.dlCell_s; dlCell_c+=r.dlCell_c;
    cqi_s+=r.cqi_s; cqi_c+=r.cqi_c;
    dlPrb_s+=r.dlPrb_s; dlPrb_c+=r.dlPrb_c;
    dlTraf_s+=r.dlTraf_s;
    users_s+=r.users_s; users_c+=r.users_c;
    if(r.tsBucket<minTs)minTs=r.tsBucket;
    if(r.tsBucket>maxTs)maxTs=r.tsBucket;
  });
  if(!has)return null;
  return{
    avgAvailability: avail_c?avail_s/avail_c:null,
    avgDlThroughputMbps: dlCell_c?dlCell_s/dlCell_c:null,
    avgCqi: cqi_c?cqi_s/cqi_c:null,
    avgDlPrbUtilization: dlPrb_c?dlPrb_s/dlPrb_c:null,
    totalTrafficGb: dlTraf_s/1024,
    avgUserCount: users_c?Math.round(users_s/users_c):null,
    dataFrom: minTs===Infinity?null:new Date(minTs),
    dataTo:   maxTs===-Infinity?null:new Date(maxTs),
  };
}

  let avail_s=0,avail_c=0,dlCell_s=0,dlCell_c=0,cqi_s=0,cqi_c=0,dlTraf_s=0;

}

async function getTimeseries(siteId,metric,granularity,groupBy,dateFrom,dateTo){
  const m=METRICS.find(x=>x.key===metric);
  if(!m)return{labels:[],datasets:[],allGroups:[]};
  const fromTs=dateFrom?new Date(dateFrom+'T00:00:00').getTime():0;
  const toTs=dateTo?new Date(dateTo+'T23:59:59').getTime():Number.MAX_SAFE_INTEGER;
  const agg=new Map();
  const allGroups=new Set();
  await DB.scanRange(siteId,fromTs,toTs,r=>{
    if(r[m.cf]===0)return;
    const gk=getGroupKey(r,groupBy);
    allGroups.add(gk);
    const tb=truncTs(r.tsBucket,granularity);
    if(!agg.has(tb))agg.set(tb,new Map());
    const inner=agg.get(tb);
    if(!inner.has(gk))inner.set(gk,{s:0,c:0});
    const en=inner.get(gk);en.s+=r[m.sf];en.c+=r[m.cf];
  });
  const sortedTs=[...agg.keys()].sort((a,b)=>a-b);
  const sortedGroups=[...allGroups].sort();
  const labels=sortedTs.map(t=>fmtTs(t,granularity));
  const datasets=sortedGroups.map((gk,gi)=>({
    label:gk,
    data:sortedTs.map(t=>{const inner=agg.get(t);if(!inner?.has(gk))return null;const en=inner.get(gk);return en.c>0?en.s/en.c:null;}),
    borderColor:COLORS[gi%COLORS.length],backgroundColor:COLORS[gi%COLORS.length]+'28',
    borderWidth:1.8,pointRadius:0,tension:0.3,spanGaps:true,
  }));
  return{labels,datasets,allGroups:sortedGroups};
}

/* Latest KPI snapshot per cell (most recent tsBucket data) */
async function getLatestCellSnapshot(siteId){
  const latest=new Map(); /* cellId → record with max tsBucket */
  await DB.scanSite(siteId,r=>{
    const existing=latest.get(r.cellId);
    if(!existing||r.tsBucket>existing.tsBucket)latest.set(r.cellId,r);
  });
  return [...latest.values()].sort((a,b)=>a.cellName.localeCompare(b.cellName));
}

/* Alert summary: count open alerts by severity */
async function getAlertSummary(){
  const all=await DB.getAllAlerts();
  let critical=0,major=0,total=0;
  for(const a of all){
    if(a.resolved)continue;
    total++;
    if(a.severity==='critical')critical++;
    else if(a.severity==='major')major++;
  }
  return{critical,major,total};
}

function buildTimeseriesControls(siteId){

          <svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
        </button></div></div>

      <div style="display:flex;align-items:center;gap:6px">
        <input type="date" value="${State.dateFrom}" onchange="State.dateFrom=this.value;refreshTimeseriesChart(${siteId})">
        <span style="font-size:12px;color:#9ca3af">to</span>
        <input type="date" value="${State.dateTo}" onchange="State.dateTo=this.value;refreshTimeseriesChart(${siteId})">

}

function setGranularity(g,siteId){State.granularity=g;document.querySelectorAll('[onclick^="setGranularity"]').forEach(b=>b.classList.toggle('on',b.getAttribute('onclick').includes(`'${g}'`)));refreshTimeseriesChart(siteId);}
function setGroupBy(v,siteId){State.groupBy=v;State.filterSet=new Set();State.allGroups=[];document.querySelectorAll('[onclick^="setGroupBy"]').forEach(b=>b.classList.toggle('on',b.getAttribute('onclick').includes(`'${v}'`)));refreshTimeseriesChart(siteId);}

function toggleFilterDd(siteId){
  const wrap=document.getElementById('filter-dd-wrap');
  const existing=document.getElementById('filter-dropdown');
  if(existing){existing.remove();return;}
  const groups=State.allGroups;
  const dd=document.createElement('div');dd.className='dd-menu';dd.id='filter-dropdown';
  dd.innerHTML=`<div class="dd-hdr"><span>Filter</span><div style="display:flex;gap:10px">
    <button onclick="setFilterAll(${siteId})" style="color:#0d9488;font-size:11px;cursor:pointer;border:0;background:none;font-weight:600">All</button>
    <button onclick="setFilterNone(${siteId})" style="color:#9ca3af;font-size:11px;cursor:pointer;border:0;background:none;font-weight:600">None</button>
  </div></div>
  ${groups.map((g,i)=>`<label class="dd-item"><input type="checkbox" ${State.filterSet.has(g)?'checked':''} onchange="toggleFilter(${JSON.stringify(g)},${siteId})"><span class="dd-dot" style="background:${COLORS[i%COLORS.length]}"></span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(g)}</span></label>`).join('')}`;
  wrap.appendChild(dd);
  setTimeout(()=>document.addEventListener('click',function close(e){if(!wrap.contains(e.target)){dd.remove();document.removeEventListener('click',close);}},),0);
}
function toggleFilter(g,siteId){if(State.filterSet.has(g))State.filterSet.delete(g);else State.filterSet.add(g);updateFilterUI();refreshTimeseriesChart(siteId);}
function setFilterAll(siteId){State.filterSet=new Set(State.allGroups);updateFilterUI();refreshTimeseriesChart(siteId);document.getElementById('filter-dropdown')?.remove();}
function setFilterNone(siteId){State.filterSet=new Set();updateFilterUI();refreshTimeseriesChart(siteId);document.getElementById('filter-dropdown')?.remove();}
function updateFilterUI(){
  const total=State.allGroups.length,sel=State.filterSet.size;
  const lbl=document.getElementById('filter-btn-label');const cnt=document.getElementById('filter-count');
  if(lbl)lbl.textContent=sel===total?'All':sel===0?'None':`${sel}/${total}`;
  if(cnt)cnt.textContent=`${sel}/${total}`;
}

async function refreshTimeseriesChart(siteId){
  const m=METRICS.find(x=>x.key===State.metric);
  const{labels,datasets,allGroups}=await getTimeseries(siteId,State.metric,State.granularity,State.groupBy,State.dateFrom,State.dateTo);
  if(JSON.stringify(allGroups)!==JSON.stringify(State.allGroups)){State.allGroups=allGroups;State.filterSet=new Set(allGroups);updateFilterUI();}
  const filtered=datasets.filter(d=>State.filterSet.has(d.label));
  const ttl=document.getElementById('sd-chart-title');
  if(ttl)ttl.textContent=`${m.label} · ${GRANULARITIES.find(g=>g.key===State.granularity)?.label} · ${VIEW_MODES.find(v=>v.key===State.groupBy)?.label} · ${State.dateFrom} → ${State.dateTo}`;
  const displayDs=filtered.map(d=>({...d,data:d.data.map(v=>v!=null&&m.isPct?v*100:v)}));
  Charts.destroy('ts-chart');
  if(!labels.length||!filtered.length)return;
  Charts.create('ts-chart',{type:'line',data:{labels,datasets:displayDs},options:{
    responsive:true,maintainAspectRatio:false,
    interaction:{mode:'index',intersect:false},
    plugins:{legend:{position:'bottom',labels:{boxWidth:12,font:{size:11}}},tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${m.isPct?c.raw?.toFixed(2)+'%':Number(c.raw).toFixed(2)}`}}},
    scales:{x:{grid:{display:false},ticks:{font:{size:10},color:'#9ca3af',maxTicksLimit:12}},y:{grid:{color:'#f3f4f6'},ticks:{font:{size:10},color:'#9ca3af',callback:v=>m.isPct?v.toFixed(0)+'%':v.toFixed(1)}}},
  }});
}

  let filtered=allAlerts.filter(a=>{
    if(AlertState.sev!=='all'&&a.severity!==AlertState.sev)return false;
    if(AlertState.resolved===0&&a.resolved!==0)return false;
    if(AlertState.resolved===1&&a.resolved!==1)return false;
    return true;
  });
  /* Sort: most recent first */
  filtered.sort((a,b)=>b.tsBucket-a.tsBucket);
  const total=filtered.length;
  const start=AlertState.page*ALERT_PAGE_SIZE;
  const page=filtered.slice(start,start+ALERT_PAGE_SIZE);

  if(!page.length){listEl.innerHTML='<div style="padding:24px;text-align:center;color:#9ca3af;font-size:13px">No alerts found</div>';pgEl.innerHTML='';return;}

  /* Build site name cache for display */
  const sites=await DB.getAll('sites');
  const siteMap=new Map(sites.map(s=>[s.id,s.name]));

  listEl.innerHTML=page.map(a=>`
    <div style="display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border-bottom:1px solid #f3f4f6">
      ${a.severity==='critical'
        ?'<svg width="15" height="15" fill="none" stroke="#dc2626" stroke-width="2" viewBox="0 0 24 24" style="flex-shrink:0;margin-top:2px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>'
        :'<svg width="15" height="15" fill="none" stroke="#d97706" stroke-width="2" viewBox="0 0 24 24" style="flex-shrink:0;margin-top:2px"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>'}
      <div style="flex:1;min-width:0">
        <p style="font-size:13px;font-weight:500;color:#111827;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(a.message)}</p>
        <div style="display:flex;gap:8px;margin-top:3px;flex-wrap:wrap">
          <span style="font-size:11px;color:#9ca3af">${escHtml(siteMap.get(a.siteId)||'Site '+a.siteId)}</span>
          ${a.cellName?`<span style="font-size:11px;color:#9ca3af">· ${escHtml(a.cellName)}</span>`:''}
          <span style="font-size:11px;color:#9ca3af">· ${fmtDt(a.tsBucket)}</span>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
        <span class="badge ${a.severity==='critical'?'badge-critical':'badge-major'}">${a.severity}</span>
        ${a.resolved
          ?'<span style="font-size:11px;color:#059669;font-weight:500">Resolved</span>'
          :`<button class="btn btn-ghost" style="padding:3px 8px;font-size:11px" title="Mark resolved" onclick="doResolveAlert(${a.id})">
              <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>Resolve
            </button>`}
      </div>
    </div>`).join('');

  /* Pagination */
  const pages=Math.ceil(total/ALERT_PAGE_SIZE);
  if(pages>1&&pgEl){
    pgEl.innerHTML=`
      <span>${start+1}–${Math.min(start+ALERT_PAGE_SIZE,total)} of ${total}</span>
      <div style="display:flex;gap:6px">
        <button class="btn" ${AlertState.page===0?'disabled':''} onclick="setAlertPage(${AlertState.page-1})">Previous</button>
        <button class="btn" ${AlertState.page>=pages-1?'disabled':''} onclick="setAlertPage(${AlertState.page+1})">Next</button>
      </div>`;
  } else if(pgEl){
    pgEl.innerHTML=`<span>${total} alert${total!==1?'s':''}</span>`;
  }
}

function onFileSelected(inp){if(inp.files[0])setImportFile(inp.files[0]);}
function setImportFile(f){
  _importFile=f;
  document.getElementById('file-name').textContent=f.name+' · '+fmtBytes(f.size);
  document.getElementById('import-btn').style.display='flex';
}

async function startImport(){
  if(!_importFile)return;
  if(_worker){_worker.terminate();_worker=null;}
  document.getElementById('import-btn').style.display='none';
  document.getElementById('import-progress').style.display='block';

  const isCSV=_importFile.name.toLowerCase().endsWith('.csv');
  const isXLSX=_importFile.name.toLowerCase().endsWith('.xlsx');
  const fileSize=_importFile.size;
  const startTime=Date.now();

  if(isXLSX&&fileSize>600*1024*1024){
    document.getElementById('import-status').textContent='⚠ XLSX >600MB: convert to CSV first for best results';
  }

  const blob=new Blob([WORKER_SRC],{type:'text/javascript'});
  const workerUrl=URL.createObjectURL(blob);
  _worker=new Worker(workerUrl);
  URL.revokeObjectURL(workerUrl);

  function setStatus(html,pct,rowsText,speedText,bucketsText){
    const s=document.getElementById('import-status');const p=document.getElementById('import-pct');
    const f=document.getElementById('import-fill');const r=document.getElementById('import-rows');
    const sp=document.getElementById('import-speed');const bk=document.getElementById('import-buckets');
    if(s)s.innerHTML=html;if(p)p.textContent=pct;if(f)f.style.width=pct;
    if(r)r.textContent=rowsText;if(sp)sp.textContent=speedText;if(bk)bk.textContent=bucketsText;
  }

  _worker.onmessage=e=>{
    const d=e.data;
    const elapsed=(Date.now()-startTime)/1000;
    const rowsPerSec=d.rows?Math.round(d.rows/elapsed):0;
    const bytesPerSec=d.processedBytes?Math.round(d.processedBytes/elapsed):0;
    if(d.type==='progress'){
      const pct=isCSV&&d.fileSize>0?Math.round(d.processedBytes/d.fileSize*100):Math.round(d.rows/(d.fileSize||1)*100);
      setStatus(`<span class="spin"></span> Parsing…`,pct+'%',
        (d.rows||0).toLocaleString()+' rows parsed',
        fmtBytes(bytesPerSec)+'/s · '+rowsPerSec.toLocaleString()+' rows/s',
        (d.buckets||0).toLocaleString()+' hourly buckets accumulated');
    } else if(d.type==='writing'){
      setStatus(`<span class="spin"></span> Writing to storage…`,'—',(d.buckets||0).toLocaleString()+' buckets','','Flushing to IndexedDB…');
    } else if(d.type==='complete'){
      _worker.terminate();_worker=null;
      setStatus('✓ Complete','100%',
        (d.rows||0).toLocaleString()+' rows in '+elapsed.toFixed(1)+'s · '+rowsPerSec.toLocaleString()+' rows/s avg',
        '',(d.buckets||0).toLocaleString()+' hourly agg buckets stored');
      document.getElementById('import-fill').style.width='100%';
      toast('Imported '+((d.rows||0).toLocaleString())+' rows → '+(d.buckets||0).toLocaleString()+' hourly buckets');
      refreshAlertBadge();
      _importFile=null;
    } else if(d.type==='error'){
      _worker.terminate();_worker=null;
      setStatus('✗ Failed: '+escHtml(d.message),'—','','','');
      toast('Import failed: '+d.message,'err');
    }
  };
  _worker.onerror=e=>{setStatus('✗ Worker error: '+escHtml(e.message),'—','','','');toast('Worker error: '+e.message,'err');_worker=null;};

  if(isCSV){
    _worker.postMessage({type:'csv',file:_importFile});
    setStatus(`<span class="spin"></span> Streaming CSV…`,'0%','Starting…','','');
  } else if(isXLSX){
    setStatus(`<span class="spin"></span> Reading XLSX…`,'0%','Loading file buffer…','','');
    const buf=await _importFile.arrayBuffer();
    _worker.postMessage({type:'xlsx',buffer:buf},[buf]);
    setStatus(`<span class="spin"></span> Parsing XLSX in background…`,'0%','Starting…','','');
  } else {
    toast('Unsupported file type. Use .csv or .xlsx','err');
    document.getElementById('import-progress').style.display='none';
    document.getElementById('import-btn').style.display='flex';
    if(_worker){_worker.terminate();_worker=null;}
  }
}

    onConfirm:async()=>{await DB.clearAll();toast('All data deleted');refreshAlertBadge();renderImport();}
  });
}

function onConvFile(inp){if(inp.files[0])processConvFile(inp.files[0]);}

async function processConvFile(file){
  const cs=document.getElementById('conv-status');const cr=document.getElementById('conv-result');
  cs.style.display='flex';cs.innerHTML='<span class="spin spin-teal"></span> Loading SheetJS…';cr.style.display='none';
  if(!window.XLSX){
    await new Promise((res,rej)=>{const s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';s.onload=res;s.onerror=rej;document.head.appendChild(s);});
  }
  cs.innerHTML='<span class="spin spin-teal"></span> Parsing…';
  try{
    const buf=await file.arrayBuffer();
    const wb=window.XLSX.read(buf,{type:'array',cellDates:true});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const data=window.XLSX.utils.sheet_to_json(ws,{defval:null,raw:false,dateNF:'yyyy-mm-dd HH:mm:ss'});
    if(!data.length){toast('No rows found','err');cs.style.display='none';return;}
    const cols=Object.keys(data[0]);
    const jsonSize=JSON.stringify(data).length;
    window._convData=data;
    cs.style.display='none';cr.style.display='block';
    cr.innerHTML=`
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:14px">
        <div class="card" style="text-align:center"><div style="font-size:24px;font-weight:700">${data.length.toLocaleString()}</div><div style="font-size:12px;color:#9ca3af;margin-top:4px">Rows</div></div>
        <div class="card" style="text-align:center"><div style="font-size:24px;font-weight:700">${cols.length}</div><div style="font-size:12px;color:#9ca3af;margin-top:4px">Columns</div></div>
        <div class="card" style="text-align:center"><div style="font-size:24px;font-weight:700">${(jsonSize/1024).toFixed(0)} KB</div><div style="font-size:12px;color:#9ca3af;margin-top:4px">JSON size</div></div>
      </div>
      <div style="display:flex;gap:8px;margin-top:12px">
        <button class="btn btn-primary" onclick="downloadJson(window._convData,'${escHtml(file.name.replace(/\.[^.]+$/,''))}.json',2)">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Download JSON (pretty)
        </button>
        <button class="btn" onclick="downloadJson(window._convData,'${escHtml(file.name.replace(/\.[^.]+$/,''))}.compact.json',0)">Download compact</button>
      </div>
      <div class="card" style="margin-top:12px">
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#9ca3af;margin-bottom:10px">Columns (${cols.length})</div>
        <div style="display:flex;flex-wrap:wrap;gap:5px">${cols.map(c=>`<span style="font-size:11px;font-family:monospace;background:#f3f4f6;border:1px solid #e5e7eb;padding:2px 8px;border-radius:5px">${escHtml(c)}</span>`).join('')}</div>
      </div>
      <div class="card" style="margin-top:12px">
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#9ca3af;margin-bottom:10px">Preview (first 5 rows)</div>
        <div style="overflow-x:auto"><table>
          <thead><tr>${cols.slice(0,10).map(c=>`<th>${escHtml(c)}</th>`).join('')}${cols.length>10?`<th>+${cols.length-10} more</th>`:''}</tr></thead>
          <tbody>${data.slice(0,5).map(row=>`<tr>${cols.slice(0,10).map(c=>`<td style="font-family:monospace;color:${row[c]==null?'#d1d5db':'#374151'}">${row[c]==null?'null':escHtml(String(row[c]))}</td>`).join('')}${cols.length>10?'<td></td>':''}</tr>`).join('')}</tbody>
        </table></div>
      </div>
      <div class="card" style="margin-top:12px">
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#9ca3af;margin-bottom:8px">JSON Preview (first 2 rows)</div>
        <pre style="font-size:11px;font-family:monospace;background:#f9fafb;border-radius:8px;padding:14px;overflow-x:auto;max-height:240px;line-height:1.5;color:#374151">${escHtml(JSON.stringify(data.slice(0,2),null,2))}</pre>
      </div>`;
    toast('Parsed '+data.length.toLocaleString()+' rows · '+cols.length+' columns');
  }catch(e){toast('Parse failed: '+e.message,'err');cs.style.display='none';}
}
function downloadJson(data,filename,indent){
  const blob=new Blob([JSON.stringify(data,null,indent)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=filename;a.click();URL.revokeObjectURL(a.href);
}
